[core]
role = agent
data_dir = /var/lib/buildsvc
log_level = info

[server]
listen = 0.0.0.0:10000
public_url = http://192.168.8.108:10000
db_path = /var/lib/buildsvc/buildsvc.db
log_retention_days = 7
agent_offline_after_sec = 15
agent_heartbeat_sec = 5
script_timeout_sec = 7200
kill_grace_sec = 10
max_upload_size_mb = 2048
terminal_enabled = true
upgrade_enabled = true

[agent]
server_url = ws://192.168.8.108:10000/api/agent/ws
work_dir = /var/lib/buildsvc/agent/work
concurrency = 1
heartbeat_sec = 5
script_timeout_sec = 7200
kill_grace_sec = 10
terminal_enabled = false
terminal_work_dir = /var/lib/buildsvc/agent/work/terminal
terminal_max_sessions = 1
upgrade_enabled = false
upgrade_work_dir = /var/lib/buildsvc/agent/work/upgrades
