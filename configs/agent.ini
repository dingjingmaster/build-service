[core]
role = agent
data_dir = ./data/agent
log_level = info

[agent]
server_url = ws://127.0.0.1:18080/api/agent/ws
name = local-linux
token = change-me-local-linux
; Optional. Use this when the machine has multiple physical NICs or non-standard interface names.
; advertise_ip = 192.168.1.10
labels = linux,amd64,local
work_dir = ./data/agent/work
concurrency = 1
heartbeat_sec = 5
script_timeout_sec = 7200
kill_grace_sec = 10
terminal_enabled = true
; Optional. Defaults to SHELL on Linux/macOS and COMSPEC/cmd.exe on Windows.
; terminal_shell = /bin/sh
terminal_work_dir = ./data/agent/work/terminal
terminal_max_sessions = 1
